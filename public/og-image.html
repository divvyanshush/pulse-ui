<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0a0a0a;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    display: flex; flex-direction: column;
    justify-content: center; padding: 80px;
    position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .content { position: relative; z-index: 1; }
  .label {
    font-size: 13px; letter-spacing: 0.2em;
    color: #555; text-transform: uppercase;
    margin-bottom: 32px;
  }
  .headline {
    font-size: 64px; font-weight: 700;
    color: #ececec; line-height: 1.1;
    letter-spacing: -0.02em;
    font-family: 'IBM Plex Sans', Arial, sans-serif;
    margin-bottom: 24px;
  }
  .sub {
    font-size: 20px; color: #666;
    line-height: 1.6; max-width: 700px;
    font-family: 'IBM Plex Sans', Arial, sans-serif;
    font-weight: 400;
  }
  .bottom {
    position: absolute; bottom: 48px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 1;
  }
  .domain { font-size: 16px; color: #444; letter-spacing: 0.1em; }
  .pills { display: flex; gap: 8px; }
  .pill {
    font-size: 11px; padding: 4px 10px;
    border: 1px solid #222; color: #555;
    letter-spacing: 0.08em;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="content">
    <div class="label">cobun ai</div>
    <div class="headline">Get your 20 minutes<br/>back every morning.</div>
    <div class="sub">HN · arXiv · GitHub · every major AI lab —<br/>ranked by what matters to builders, not clicks.</div>
  </div>
  <div class="bottom">
    <div class="domain">cobunai.com</div>
    <div class="pills">
      <div class="pill">20+ SOURCES</div>
      <div class="pill">HEAT RANKED</div>
      <div class="pill">FREE</div>
    </div>
  </div>
</body>
</html>
